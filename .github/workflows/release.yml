name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build & Release (Windows)
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: acerola

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: acerola/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            acerola/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Extract versions from tag
        shell: bash
        run: |
          VERSION_FULL=${GITHUB_REF_NAME#v}
          VERSION_MSI=${VERSION_FULL%%-*}
          echo "VERSION_FULL=$VERSION_FULL" >> $GITHUB_ENV
          echo "VERSION_MSI=$VERSION_MSI" >> $GITHUB_ENV

      - name: Update tauri.conf.json (versão MSI sem sufixo)
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            config.version = process.env.VERSION_MSI;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2) + '\n');
          "
        env:
          VERSION_MSI: ${{ env.VERSION_MSI }}

      - name: Update Cargo.toml
        shell: bash
        run: |
          sed -i "s/^version = \".*\"/version = \"$VERSION_FULL\"/" src-tauri/Cargo.toml
        env:
          VERSION_FULL: ${{ env.VERSION_FULL }}

      - name: Update package.json
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION_FULL;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
        env:
          VERSION_FULL: ${{ env.VERSION_FULL }}

      - name: Build MSI
        run: npm run tauri -- build --bundles msi

      - name: Rename MSI
        shell: powershell
        run: |
          $msi = Get-Item "src-tauri/target/release/bundle/msi/*.msi"
          Rename-Item $msi.FullName "acerola-windows-x86_64.msi"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Acerola ${{ env.VERSION_FULL }}
          draft: false
          prerelease: ${{ contains(env.VERSION_FULL, '-') }}
          files: acerola/src-tauri/target/release/bundle/msi/acerola-windows-x86_64.msi
          generate_release_notes: true

      - name: Restore tauri.conf.json com versão completa
        shell: bash
        run: |
          node -e "
            const fs = require('fs');
            const config = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            config.version = process.env.VERSION_FULL;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(config, null, 2) + '\n');
          "
        env:
          VERSION_FULL: ${{ env.VERSION_FULL }}

      - name: Commit version bump
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src-tauri/tauri.conf.json src-tauri/Cargo.toml package.json
          if ! git diff --staged --quiet; then
            git commit -m "[chore]: bump version to $VERSION_FULL [skip ci]"
            git push origin HEAD:main HEAD:develop
          fi
        env:
          VERSION_FULL: ${{ env.VERSION_FULL }}
