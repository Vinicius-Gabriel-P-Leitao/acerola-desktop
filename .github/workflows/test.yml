name: Test Build

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  test-build:
    name: Build & Test (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: acerola

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: acerola/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            acerola/src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install dependencies
        run: npm ci

      - name: Build (no bundle)
        run: npm run tauri -- build --no-bundle

      - name: Run all tests
        run: npm run test:all
